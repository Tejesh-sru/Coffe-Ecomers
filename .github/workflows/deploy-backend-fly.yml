name: Backend Build Workflow

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-fly.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    environment:
      name: backend
      url: ${{ steps.backend_url.outputs.url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: check_secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
        run: |
          if [ -z "$FLY_API_TOKEN" ] || [ -z "$FLY_APP_NAME" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FLY_API_TOKEN or FLY_APP_NAME is missing. Skipping Fly.io backend deployment."
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Flyctl
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Create Fly app if missing
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
        run: |
          flyctl apps create "$FLY_APP_NAME" || true

      - name: Deploy backend
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
        run: |
          flyctl deploy \
            --app "$FLY_APP_NAME" \
            --config backend/fly.toml \
            --dockerfile backend/Dockerfile \
            --remote-only \
            --path backend

      - name: Deployment URL
        id: backend_url
        if: steps.check_secrets.outputs.has_secrets == 'true'
        env:
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
        run: |
          echo "url=https://${FLY_APP_NAME}.fly.dev" >> "$GITHUB_OUTPUT"
          echo "Backend URL: https://${FLY_APP_NAME}.fly.dev"

      - name: Print backend link
        run: |
          echo "## Backend Deployment" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check_secrets.outputs.has_secrets }}" = "true" ]; then
            echo "- Backend URL: https://${{ secrets.FLY_APP_NAME }}.fly.dev" >> "$GITHUB_STEP_SUMMARY"
            echo "- Health URL: https://${{ secrets.FLY_APP_NAME }}.fly.dev/api/health" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Backend URL: not available (set FLY_API_TOKEN and FLY_APP_NAME secrets)" >> "$GITHUB_STEP_SUMMARY"
          fi
