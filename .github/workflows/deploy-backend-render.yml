name: Deploy Backend (Render)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-render.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy hook secret
        id: check_secret
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is missing. Skipping backend deploy trigger."
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Render deploy hook
        if: steps.check_secret.outputs.has_secret == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deployment triggered successfully"
