name: Frontend Build Workflow

on:
  push:
    branches: [main]
    paths:
      - "Fresher-s-Cafe-main/**"
      - ".github/workflows/deploy-frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Fresher-s-Cafe-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Fresher-s-Cafe-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          VITE_BASE_PATH: /Coffe-Ecomers/
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::warning::PROD_API_BASE_URL is missing. Building frontend with default API URL."
          fi

          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Fresher-s-Cafe-main/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print frontend link
        run: |
          FRONTEND_URL="${{ steps.deployment.outputs.page_url }}"
          if [ -z "$FRONTEND_URL" ]; then
            FRONTEND_URL="https://tejesh-sru.github.io/Coffe-Ecomers/"
          fi

          echo "Frontend URL: $FRONTEND_URL"
          echo "## Frontend Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend URL: $FRONTEND_URL" >> "$GITHUB_STEP_SUMMARY"
